<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Contato - Johnson Gomes</title>
        <!-- Link para o arquivo CSS e Bootstrap -->
        <link rel="stylesheet" href="CSS/estilo.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <!-- Bootstrap icons -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
    </head>
    <body class="bg-light">
        <!-- HEADER -->
        <header class="bg-dark text-white py-4">
            <div class="container d-flex flex-column flex-md-row align-items-center justify-content-between">
                <a href="/main.html" class="h4 mb-0 text-white">Johnson Gomes</a>
                <nav class="mt-2 mt-md-0">
                    <a href="/sobre.html" class="text-white me-3"><i class="bi bi-person-circle"></i>Sobre</a>
                    <a href="/projetos.html" class="text-white me-3"><i class="bi bi-code-slash"></i>Projetos</a>
                    <a href="/contato.html" class="text-white"><i class="bi bi-envelope"></i>Contato</a>
                </nav>
            </div>
        </header>
        <!-- CONTATO -->
        <section id='contato' class='container py-5'>
            <h2>Contato</h2>
                <form id='form-contato'>
                    <div class='mb-3'>
                        <label for='nome' class='form-label'>Nome</label>
                        <input type='text' class='form-control' id='nome' required />
                    </div>
                    <div class='mb-3'>
                        <label for='email' class='form-label'>E-mail</label>
                        <input type='email' class='form-control' id='email' required />
                    </div>
                    <div class='mb-3'>
                        <label for='mensagem' class='form-label'>Mensagem</label>
                        <textarea class='form-control' id='mensagem' rows='3' required></textarea>
                    </div>
                    <button type='submit' class='btn btn-primary'>Enviar</button>
                </form>
            </section>
        <script src="JS/script.js"></script>
    </body>
</html>
