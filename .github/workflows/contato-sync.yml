name: Atualiza contatos via repository_dispatch

on:
  repository_dispatch:
    types: [contato-salvo]

jobs:
  salvar-contatos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Criar/atualizar contatos.json
        run: |
          echo "${{ toJson(github.event.client_payload.contatos) }}" > contatos.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add contatos.json
          git commit -m "Atualiza contatos via dispatch" || echo "Nenhuma alteração para commit"
          git push
